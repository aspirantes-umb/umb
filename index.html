<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redireccionando...</title>
</head>

<body>

<h3 style="text-align:center">
Conectando con el portal UMB...
</h3>

<script>

window.onload = function() {

    const params = new URLSearchParams(window.location.search);

    const destino = params.get('destino');
    const usuario = params.get('usuario');

    const fechaHora = new Date().toLocaleString('es-MX');

    const urlTracking =
        "https://docs.google.com/forms/d/e/1FAIpQLSePBeqotp1CuRrmcwjOD5WDpGHzauohLSVEeY62qU6GC5w6yw/formResponse?" +
        "entry.1144117004=" + encodeURIComponent(usuario);

    const img = new Image();

    img.src = urlTracking;

    document.body.appendChild(img);

    setTimeout(function(){

        if(destino){

            window.location.replace(
                decodeURIComponent(destino)
            );

        }else{

            window.location.replace(
                "https://umb.edomex.gob.mx/"
            );

        }

    },2000);

};

</script>

</body>
</html>
