<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Redireccionando...</title>

</head>

<body>

<div style="
font-family:Arial;
text-align:center;
margin-top:100px;
">

<h2>Conectando con el portal UMB...</h2>

<p>Espere un momento.</p>

</div>

<script>

window.addEventListener("load", async () => {

    const params = new URLSearchParams(window.location.search);

    const destino = params.get("destino");

    const usuario = params.get("usuario");

    const uid = params.get("uid");

    const FORM_URL =
        "https://docs.google.com/forms/d/e/1FAIpQLSePBeqotp1CuRrmcwjOD5WDpGHzauohLSVEeY62qU6GC5w6yw/formResponse";

    const ENTRY_CORREO = "entry.1144117004";

    /*
      CREA UN SEGUNDO CAMPO EN EL FORM
      para guardar UID
    */

    const ENTRY_UID = "entry.123456789";

    try {

        const formData = new FormData();

        formData.append(
            ENTRY_CORREO,
            usuario || "anonimo@umb.edu"
        );

        formData.append(
            ENTRY_UID,
            uid || ""
        );

        await fetch(
            FORM_URL,
            {
                method: "POST",
                mode: "no-cors",
                body: formData
            }
        );

        console.log("Tracking registrado");

    }
    catch(error){

        console.error(error);

    }

    setTimeout(() => {

        if(destino){

            window.location.replace(
                decodeURIComponent(destino)
            );

        }else{

            window.location.replace(
                "https://umb.edomex.gob.mx/"
            );

        }

    },1500);

});

</script>

</body>
</html>
