<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Redireccionando...</title>
    
    <script>
        window.onload = function() {
            // 1. Extraer los parámetros de la URL enviados desde el correo
            const urlParams = new URLSearchParams(window.location.search);
            const destino = urlParams.get('destino');
            const usuario = urlParams.get('usuario') || 'anonimo@umb.edu';

            // 2. CONFIGURACIÓN DEL FORMULARIO DE GOOGLE
            // Reemplaza el ID "1FAIpQLScXXXXXX" por el tuyo de la URL del paso anterior
            const formBaseUrl = "https://docs.google.com/forms/d/e/1FAIpQLScXXXXXX/formResponse"; 
            // Reemplaza "entry.123456789" por el número real de tu pregunta
            const formEntryId = "entry.123456789"; 

            if (destino) {
                // 3. Crear una petición en segundo plano (Fetch) para registrar el clic en el Google Sheet
                const formData = new URLSearchParams();
                formData.append(formEntryId, decodeURIComponent(usuario));

                // Enviamos los datos al formulario en modo 'no-cors' para evitar bloqueos de seguridad externos
                fetch(formBaseUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                })
                .then(() => {
                    // Una vez enviado el registro (o procesado), redirecciona al alumno a la UMB
                    window.location.href = decodeURIComponent(destino);
                })
                .catch(() => {
                    // Si falla el internet o el envío, redirecciona de todos modos para no afectar al alumno
                    window.location.href = decodeURIComponent(destino);
                });

            } else {
                // Si la URL viene mal estructurada, enviarlo directo a la página principal de la UMB
                window.location.href = "https://umb.edomex.gob.mx/"; 
            }
        };
    </script>
</head>
<body>
    <p style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">
        Cargando portal de registro... por favor espere.
    </p>
</body>
</html>
