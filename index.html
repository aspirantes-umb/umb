<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Redireccionando...</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script>
        window.onload = function() {
            // 2. Extraer los parámetros de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const destino = urlParams.get('destino');
            const usuario = urlParams.get('usuario') || 'anonimo';

            if (destino) {
                // 3. Registrar el evento personalizado en Analytics
                gtag('event', 'clic_registro_umb', {
                    'usuario_correo': usuario,
                    'url_destino': destino
                });

                // 4. Redireccionar tras un leve retraso (150ms) para asegurar el envío a Analytics
                setTimeout(function() {
                    window.location.href = decodeURIComponent(destino);
                }, 150);
            } else {
                // Si algo falla, enviarlo a la página principal de la UMB
                window.location.href = "https://umb.edomex.gob.mx/"; 
            }
        };
    </script>
</head>
<body>
    <p style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">
        Cargando portal de registro... por favor espere.
    </p>
</body>
</html>
