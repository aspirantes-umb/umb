<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redireccionando... | UMB</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; color: #333; background-color: #f4f6f8; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #8A1538; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>Conectando con el portal de la UMB...</h2>
    <div class="loader"></div>
    <p>Por favor, espera un momento.</p>

    <script>
        // 1. Obtener los parámetros 'fila' y 'destino' de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const fila = urlParams.get('fila');
        const destinoReal = urlParams.get('destino');

        // ⚠️ REEMPLAZA ESTO: Pon el ID de tu script de Google aquí para enlazar el registro (O usa una API de Webhook)
        const GOOGLE_SCRIPT_URL = "TU_NUEVA_URL_DE_APPLICATIONS_SCRIPT_SI_Decides_Dejar_doPost";

        // Función para registrar y redirigir
        async function procesarRedireccion() {
            if (fila && destinoReal) {
                try {
                    // Enviar de fondo el registro a Google Sheets sin bloquear la pantalla
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Evita bloqueos de seguridad de navegadores (CORS)
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fila: fila })
                    });
                } catch (error) {
                    console.log("Error registrando clic:", error);
                }
                
                // Redirección inmediata a la liga original del alumno
                window.location.href = decodeURIComponent(destinoReal);
            } else {
                document.body.innerHTML = "<h2>Error: Enlace de registro no válido.</h2>";
            }
        }

        // Ejecutar al cargar la página
        procesarRedireccion();
    </script>
</body>
</html>
